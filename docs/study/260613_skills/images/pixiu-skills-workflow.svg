<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Pixiu Skills workflow</title>
  <desc id="desc">A cartoon technical diagram explaining how Pixiu discovers skills, injects skill summaries into the system prompt, exposes the skill tool schema to the LLM, and loads SKILL.md or reference files on demand.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f7f7f2; }
      .ink { fill: #1f2937; }
      .muted { fill: #64748b; }
      .blue { fill: #2563eb; }
      .purple { fill: #7c3aed; }
      .green { fill: #047857; }
      .red { fill: #be123c; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .panelSoft { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .yellow { fill: #fef3c7; stroke: #92400e; stroke-width: 2.5; }
      .bluePanel { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2.5; }
      .greenPanel { fill: #d1fae5; stroke: #047857; stroke-width: 2.5; }
      .purplePanel { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2.5; }
      .rosePanel { fill: #ffe4e6; stroke: #be123c; stroke-width: 2.5; }
      .grayPanel { fill: #f1f5f9; stroke: #475569; stroke-width: 2.5; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .lineBlue { stroke: #2563eb; stroke-width: 3.2; fill: none; marker-end: url(#arrowBlue); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #64748b; stroke-width: 2.6; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .label { font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .title { font: 900 42px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .sub { font: 600 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 600 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 650 17px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #1f2937; }
      .monoSmall { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #334155; }
      .num { font: 900 18px ui-sans-serif, system-ui, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <text x="70" y="64" class="title">Pixiu Skills: how a small instruction pack becomes agent behavior</text>
  <text x="72" y="98" class="sub">Skill = discoverable workflow context. MCP/tool = callable external capability. The skill teaches when and how to use tools.</text>

  <!-- Pixiu mascot / runtime -->
  <g transform="translate(64,150)">
    <rect x="0" y="0" width="250" height="150" rx="28" class="purplePanel"/>
    <text x="28" y="42" class="label">Pixiu runtime</text>
    <text x="28" y="74" class="small">buildRuntime()</text>
    <circle cx="64" cy="108" r="25" fill="#a78bfa" stroke="#4c1d95" stroke-width="3"/>
    <path d="M48 103 C55 82, 73 82, 80 103 C92 103, 96 116, 85 126 C74 139, 53 137, 43 125 C33 113, 37 103, 48 103 Z" fill="#ffffff" stroke="#4c1d95" stroke-width="2.5"/>
    <circle cx="57" cy="111" r="3" fill="#4c1d95"/>
    <circle cx="75" cy="111" r="3" fill="#4c1d95"/>
    <text x="102" y="116" class="tiny">creates a runnable</text>
    <text x="102" y="137" class="tiny">CLI agent backend</text>
  </g>

  <!-- Step 1 loader -->
  <g transform="translate(374,138)">
    <rect x="0" y="0" width="330" height="184" rx="24" class="bluePanel"/>
    <text x="24" y="42" class="label">1. SkillLoader</text>
    <text x="24" y="75" class="small">new SkillLoader(paths)</text>
    <text x="24" y="108" class="monoSmall">.pixiu/skills</text>
    <text x="24" y="130" class="monoSmall">.opencode/skills</text>
    <text x="24" y="152" class="monoSmall">~/.claude/skills</text>
    <text x="24" y="174" class="monoSmall">~/.agents/skills</text>
  </g>
  <path class="line" d="M314 225 C338 225, 345 225, 374 225"/>

  <!-- Discover -->
  <g transform="translate(770,128)">
    <rect x="0" y="0" width="360" height="204" rx="24" class="yellow"/>
    <text x="24" y="42" class="label">2. Discover skills</text>
    <text x="24" y="74" class="small">loader.list() -> discover()</text>
    <text x="24" y="108" class="mono">scan **/SKILL.md</text>
    <text x="24" y="138" class="mono">parse frontmatter:</text>
    <text x="48" y="166" class="monoSmall">name</text>
    <text x="48" y="188" class="monoSmall">description</text>
  </g>
  <path class="line" d="M704 225 C735 225, 746 225, 770 225"/>

  <!-- Skill package anatomy -->
  <g transform="translate(1190,116)">
    <rect x="0" y="0" width="650" height="250" rx="28" class="panel"/>
    <text x="26" y="42" class="label">A skill package</text>
    <text x="26" y="78" class="mono">systematic-debugging/</text>
    <text x="54" y="106" class="mono">SKILL.md  </text>
    <text x="178" y="106" class="small">required: trigger + main workflow</text>
    <text x="54" y="136" class="mono">root-cause-tracing.md</text>
    <text x="302" y="136" class="small">optional deep reference</text>
    <text x="54" y="166" class="mono">defense-in-depth.md</text>
    <text x="290" y="166" class="small">optional pattern/detail</text>
    <text x="54" y="196" class="mono">find-polluter.sh</text>
    <text x="238" y="196" class="small">optional helper script</text>
    <text x="26" y="228" class="tiny">SKILL.md is the front door. Other files are appendices loaded only when useful.</text>
  </g>
  <path class="line" d="M1130 226 C1158 226, 1168 226, 1190 226"/>

  <!-- Skill summary object -->
  <g transform="translate(770,380)">
    <rect x="0" y="0" width="360" height="166" rx="24" class="grayPanel"/>
    <text x="24" y="40" class="label">SkillSummary</text>
    <text x="24" y="72" class="monoSmall">{ name, description,</text>
    <text x="24" y="96" class="monoSmall">  rootDir, skillPath,</text>
    <text x="24" y="120" class="monoSmall">  source, duplicates? }</text>
    <text x="24" y="148" class="tiny">No full instructions yet.</text>
  </g>
  <path class="line" d="M950 332 C950 350, 950 360, 950 380"/>

  <!-- System prompt -->
  <g transform="translate(64,390)">
    <rect x="0" y="0" width="640" height="270" rx="28" class="greenPanel"/>
    <text x="28" y="44" class="label">3. Build system prompt</text>
    <text x="28" y="78" class="small">agentConfig.systemPrompt + skillPrompt</text>
    <text x="28" y="116" class="monoSmall">You are Pixiu, a local-first CLI agent...</text>
    <text x="28" y="154" class="monoSmall">Available skills:</text>
    <text x="48" y="180" class="monoSmall">- systematic-debugging: Use when encountering any bug...</text>
    <text x="48" y="206" class="monoSmall">- frontend-design: Guidance for distinctive visual design...</text>
    <text x="48" y="232" class="monoSmall">- skill-creator: Create and improve skills...</text>
    <text x="28" y="258" class="tiny">Only summaries are injected here, not all SKILL.md text.</text>
  </g>
  <path class="line" d="M770 464 C735 464, 730 510, 704 510"/>
  <path class="line" d="M540 322 C525 350, 510 365, 480 390"/>

  <!-- Tool registry -->
  <g transform="translate(64,720)">
    <rect x="0" y="0" width="520" height="226" rx="28" class="bluePanel"/>
    <text x="28" y="44" class="label">4. Register the skill tool</text>
    <text x="28" y="78" class="small">createSkillTools(loader) returns ToolDefinition</text>
    <text x="28" y="116" class="monoSmall">{ name: "skill",</text>
    <text x="28" y="140" class="monoSmall">  description, risk, inputSchema,</text>
    <text x="28" y="164" class="monoSmall">  execute(input, context) }</text>
    <text x="28" y="198" class="tiny">execute is local code. It is not sent to the model.</text>
  </g>
  <path class="line" d="M480 322 C425 460, 333 640, 322 720"/>

  <!-- Tools sent to LLM -->
  <g transform="translate(684,720)">
    <rect x="0" y="0" width="450" height="226" rx="28" class="purplePanel"/>
    <text x="28" y="44" class="label">5. LLM tools field</text>
    <text x="28" y="78" class="small">tools.toLLMTools()</text>
    <text x="28" y="116" class="monoSmall">function skill({</text>
    <text x="28" y="140" class="monoSmall">  name: string,</text>
    <text x="28" y="164" class="monoSmall">  path?: string</text>
    <text x="28" y="188" class="monoSmall">})</text>
    <text x="212" y="188" class="tiny">schema only: name, description, parameters</text>
  </g>
  <path class="line" d="M584 834 C625 834, 646 834, 684 834"/>

  <!-- LLM request -->
  <g transform="translate(1210,430)">
    <rect x="0" y="0" width="610" height="270" rx="30" class="panel"/>
    <text x="28" y="44" class="label">6. LLM request</text>
    <text x="28" y="82" class="small">messages</text>
    <text x="48" y="112" class="monoSmall">system prompt + session history + user query</text>
    <text x="28" y="154" class="small">tools</text>
    <text x="48" y="184" class="monoSmall">function schemas: skill, read, shell, ...</text>
    <text x="28" y="228" class="tiny">The model chooses whether to answer or return a tool_call.</text>
  </g>
  <path class="line" d="M704 525 C890 525, 1020 525, 1210 525"/>
  <path class="line" d="M1134 834 C1188 790, 1245 738, 1290 700"/>

  <!-- User query -->
  <g transform="translate(960,610)">
    <circle cx="54" cy="54" r="48" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
    <circle cx="54" cy="45" r="18" fill="#f9c7a9" stroke="#1f2937" stroke-width="2"/>
    <path d="M25 94 C32 72, 76 72, 83 94" fill="#93c5fd" stroke="#1f2937" stroke-width="2"/>
    <path d="M39 43 C42 20, 68 20, 70 43" fill="#78350f" stroke="#1f2937" stroke-width="2"/>
    <text x="118" y="45" class="small">User query</text>
    <text x="118" y="73" class="monoSmall">"tests fail, debug it"</text>
  </g>
  <path class="line" d="M1084 664 C1135 640, 1168 606, 1210 585"/>

  <!-- Model -->
  <g transform="translate(1240,790)">
    <rect x="0" y="0" width="300" height="160" rx="30" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
    <path d="M60 98 C38 82, 34 56, 55 42 C80 24, 126 36, 126 72 C126 106, 86 118, 60 98 Z" fill="#7dd3fc" stroke="#075985" stroke-width="3"/>
    <circle cx="76" cy="68" r="5" fill="#075985"/>
    <circle cx="104" cy="68" r="5" fill="#075985"/>
    <text x="145" y="54" class="label">LLM</text>
    <text x="145" y="88" class="small">returns tool_call</text>
    <text x="145" y="116" class="monoSmall">skill({name, path?})</text>
  </g>
  <path class="lineBlue" d="M1515 700 C1495 748, 1460 773, 1410 790"/>

  <!-- Execute branch -->
  <g transform="translate(1190,770)">
    <rect x="-6" y="210" width="650" height="74" rx="22" class="rosePanel"/>
    <text x="24" y="256" class="label">7. Pixiu executes locally: ToolRegistry.execute -> skill.execute(input, context)</text>
  </g>
  <path class="line" d="M1390 950 C1390 968, 1390 978, 1390 990"/>

  <!-- Result branches -->
  <g transform="translate(1190,1000)">
    <rect x="0" y="0" width="302" height="54" rx="18" class="greenPanel"/>
    <text x="18" y="34" class="small">no path: load SKILL.md</text>
    <rect x="340" y="0" width="308" height="54" rx="18" class="yellow"/>
    <text x="358" y="34" class="small">has path: read reference</text>
  </g>

  <!-- Bottom note: fit inside -->
  <g transform="translate(70,980)">
    <rect x="0" y="0" width="1020" height="70" rx="24" fill="#fff7ed" stroke="#c2410c" stroke-width="2.5"/>
    <text x="24" y="30" class="small">Key distinction</text>
    <text x="24" y="56" class="tiny">Skill instructions tell the agent how to work. MCP/tools expose callable capabilities. A skill can say when to call read, shell, web_fetch, or an MCP tool, but it is not itself an external service.</text>
  </g>

  <!-- Number badges -->
  <g>
    <circle cx="346" cy="225" r="18" fill="#111827"/><text x="341" y="232" class="num">1</text>
    <circle cx="736" cy="225" r="18" fill="#111827"/><text x="731" y="232" class="num">2</text>
    <circle cx="520" cy="373" r="18" fill="#111827"/><text x="515" y="380" class="num">3</text>
    <circle cx="475" cy="640" r="18" fill="#111827"/><text x="470" y="647" class="num">4</text>
    <circle cx="634" cy="834" r="18" fill="#111827"/><text x="629" y="841" class="num">5</text>
    <circle cx="1158" cy="526" r="18" fill="#111827"/><text x="1153" y="533" class="num">6</text>
    <circle cx="1546" cy="1007" r="18" fill="#111827"/><text x="1541" y="1014" class="num">7</text>
  </g>
</svg>
